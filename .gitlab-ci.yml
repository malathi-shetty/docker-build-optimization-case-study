stages:
  - build
  - sonar
  - docker
  - security
  - push
  - report

variables:
  IMAGE_NAME: "docker-build-gitlab"
  IMAGE_TAG: "$CI_PIPELINE_IID"
  DOCKER_TLS_CERTDIR: ""

debug:
  stage: build
  image: alpine

  script:
    - pwd
    - ls -la
    - find . -name pom.xml

build_jar:
  stage: build
  image: maven:3.9-eclipse-temurin-21

  script:
    - cd app/build-optimization-demo
    - mvn clean verify

  artifacts:
    paths:
      - app/build-optimization-demo/target
    expire_in: 90 days

sonarqube_scan:
  stage: sonar
  image: maven:3.9-eclipse-temurin-21

  dependencies:
    - build_jar

  script:
    - cd app/build-optimization-demo
    - mvn clean verify sonar:sonar \
      -Dsonar.projectKey=malathi-shetty_docker-build-optimization-case-study \
      -Dsonar.organization=malathi-shetty \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.token=$SONAR_TOKEN \
      -Dsonar.java.binaries=target/classes

build_docker:
  stage: docker
  image: docker:24

  services:
    - docker:dind

  script:
    - docker build -f Dockerfile.multistage -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

  artifacts:
    paths:
      - image.tar

trivy_scan:
  stage: security
  image: docker:24

  services:
    - docker:dind

  dependencies:
    - build_docker

  script:
    - mkdir -p reports
    - docker load -i image.tar
    - docker run --rm \
      -v /var/run/docker.sock:/var/run/docker.sock \
      -v $(pwd)/reports:/reports \
      aquasec/trivy:latest image \
      --timeout 15m \
      --scanners vuln \
      --format table \
      -o /reports/trivy-report.txt \
      $IMAGE_NAME:$IMAGE_TAG

    - cat reports/trivy-report.txt

  artifacts:
    paths:
      - reports/

docker_push:
  stage: push
  image: docker:24

  services:
    - docker:dind

  dependencies:
    - build_docker

  script:
    - docker load -i image.tar

    - echo "$DOCKER_PASS" | docker login \
      -u "$DOCKER_USER" \
      --password-stdin

    - docker tag $IMAGE_NAME:$IMAGE_TAG \
      $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG

    - docker tag $IMAGE_NAME:$IMAGE_TAG \
      $DOCKER_USER/$IMAGE_NAME:latest

    - docker push $DOCKER_USER/$IMAGE_NAME:$IMAGE_TAG

    - docker push $DOCKER_USER/$IMAGE_NAME:latest

generate_report:
  stage: report
  image: alpine:latest

  dependencies:
    - trivy_scan
    - docker_push

  script:
    - mkdir -p reports

    - echo "Pipeline ID = $CI_PIPELINE_ID" > reports/gitlab-report.txt
    - echo "Project Name = $CI_PROJECT_NAME" >> reports/gitlab-report.txt
    - echo "Commit SHA = $CI_COMMIT_SHA" >> reports/gitlab-report.txt
    - echo "Branch = $CI_COMMIT_REF_NAME" >> reports/gitlab-report.txt
    - echo "Date = $(date)" >> reports/gitlab-report.txt

    - cat reports/gitlab-report.txt

  artifacts:
    paths:
      - reports/
    expire_in: 30 days