stages:
  - build
  - sonar
  - docker
  - security
  - report

debug:
  stage: build
  image: alpine

  script:
    - pwd
    - ls -la
    - find . -name pom.xml

variables:
  IMAGE_NAME: "docker-build-gitlab"
  IMAGE_TAG: "$CI_PIPELINE_IID"
  DOCKER_TLS_CERTDIR: ""

build_jar:
  stage: build
  image: maven:3.9-eclipse-temurin-21

  script:
    - cd app/build-optimization-demo
    - mvn clean verify

  artifacts:
    paths:
      - app/build-optimization-demo/target
    expire_in: 90 days

sonarqube_scan:
  stage: sonar
  image: maven:3.9-eclipse-temurin-21

  dependencies:
    - build_jar

  script:
    - cd app/build-optimization-demo
    - mvn clean verify sonar:sonar -Dsonar.projectKey=malathi-shetty_docker-build-optimization-case-study -Dsonar.organization=malathi-shetty -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN -Dsonar.java.binaries=target/classes

build_docker:
  stage: docker
  image: docker:24

  services:
    - docker:dind

  script:
    - docker build -f Dockerfile.multistage -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

  artifacts:
    paths:
      - image.tar

trivy_scan:
  stage: security
  image: docker:24

  services:
    - docker:dind

  dependencies:
    - build_docker

  script:
    - mkdir -p reports
    - docker load -i image.tar
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd)/reports:/reports aquasec/trivy:latest image --timeout 15m --scanners vuln --format table -o /reports/trivy-report.txt $IMAGE_NAME:$IMAGE_TAG
    - cat reports/trivy-report.txt

  artifacts:
    paths:
      - reports/

generate_report:
  stage: report
  image: alpine:latest

  dependencies:
    - trivy_scan

  script:
    - mkdir -p reports
    - echo "Pipeline ID = $CI_PIPELINE_ID" > reports/gitlab-report.txt
    - echo "Project Name = $CI_PROJECT_NAME" >> reports/gitlab-report.txt
    - echo "Commit SHA = $CI_COMMIT_SHA" >> reports/gitlab-report.txt
    - cat reports/gitlab-report.txt

  artifacts:
    paths:
      - reports/