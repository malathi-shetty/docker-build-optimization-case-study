stages:
  - build
  - sonar
  - docker
  - security
  - deploy
  - report

variables:
  IMAGE_NAME: "docker-build-gitlab"
  IMAGE_TAG: "$CI_PIPELINE_IID"
  DOCKER_TLS_CERTDIR: ""

# ---------------- BUILD ----------------
build_jar:
  stage: build
  image: maven:3.9-eclipse-temurin-21

  script:
    - cd app/build-optimization-demo
    - mvn clean verify

  artifacts:
    paths:
      - app/build-optimization-demo/target
    expire_in: 7 days

# ---------------- SONAR ----------------
sonarqube_scan:
  stage: sonar
  image: maven:3.9-eclipse-temurin-21

  dependencies:
    - build_jar

  script:
    - cd app/build-optimization-demo
    - mvn sonar:sonar
      -Dsonar.projectKey=malathi-shetty_docker-build-optimization-case-study
      -Dsonar.organization=malathi-shetty
      -Dsonar.host.url=https://sonarcloud.io
      -Dsonar.token=$SONAR_TOKEN
      -Dsonar.java.binaries=target/classes

# ---------------- DOCKER BUILD ----------------
build_docker:
  stage: docker
  image: docker:24

  services:
    - docker:dind

  script:
    - docker build -f Dockerfile.multistage -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

  artifacts:
    paths:
      - image.tar

# ---------------- SECURITY (TRIVY) ----------------
trivy_scan:
  stage: security
  image: docker:24

  services:
    - docker:dind

  dependencies:
    - build_docker

  script:
    - mkdir -p reports
    - docker load -i image.tar
    - docker run --rm
      -v /var/run/docker.sock:/var/run/docker.sock
      -v $(pwd)/reports:/reports
      aquasec/trivy:latest image
      --severity HIGH,CRITICAL
      --format table
      -o /reports/trivy-report.txt
      $IMAGE_NAME:$IMAGE_TAG
    - cat reports/trivy-report.txt

  artifacts:
    paths:
      - reports/

# ---------------- NEXUS DEPLOY ----------------
deploy_nexus:
  stage: deploy
  image: curlimages/curl:latest

  dependencies:
    - build_jar

  script:
    - echo "Uploading WAR to Nexus..."
    - ls -la app/build-optimization-demo/target

    - curl -u "$NEXUS_USER:$NEXUS_PASSWORD"
      --upload-file app/build-optimization-demo/target/build-optimization-demo-1.0-SNAPSHOT.war
      http://35.92.84.93:8082/repository/maven-snapshots/com/demo/build-optimization-demo/1.0-SNAPSHOT/build-optimization-demo-1.0-SNAPSHOT.war

# ---------------- DOCKER HUB PUSH ----------------
dockerhub_push:
  stage: deploy
  image: docker:24

  services:
    - docker:dind

  dependencies:
    - build_docker

  script:
    - docker load -i image.tar
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

    - docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
    - docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

    - docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
    - docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

# ---------------- TOMCAT DEPLOY ----------------
deploy_tomcat:
  stage: deploy
  image: curlimages/curl:latest

  dependencies:
    - build_jar

  script:
    - echo "Deploying WAR to Tomcat..."
    - ls -la app/build-optimization-demo/target

    - curl -u "admin:Admin@123"
      -T app/build-optimization-demo/target/build-optimization-demo-1.0-SNAPSHOT.war
      "http://35.92.84.93:8080/manager/text/deploy?path=/build-optimization-demo&update=true"

# ---------------- REPORT ----------------
generate_report:
  stage: report
  image: alpine:latest

  script:
    - mkdir -p reports
    - echo "Pipeline ID = $CI_PIPELINE_ID" > reports/gitlab-report.txt
    - echo "Project = $CI_PROJECT_NAME" >> reports/gitlab-report.txt
    - echo "Commit = $CI_COMMIT_SHA" >> reports/gitlab-report.txt
    - echo "Image = $IMAGE_NAME:$IMAGE_TAG" >> reports/gitlab-report.txt
    - date >> reports/gitlab-report.txt
    - cat reports/gitlab-report.txt

  artifacts:
    paths:
      - reports/