name: Full DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: docker-build-github
  IMAGE_TAG: ${{ github.run_number }}

jobs:

# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Jar
        run: |
          cd app/build-optimization-demo
          mvn clean verify

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: app/build-optimization-demo/target


# ---------------- SONAR ----------------
  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd app/build-optimization-demo
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN


# ---------------- DOCKER BUILD ----------------
  docker:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.multistage \
            -t $IMAGE_NAME:$IMAGE_TAG .


# ---------------- SECURITY (TRIVY) ----------------
  security:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Create report folder
        run: mkdir -p reports

      - name: Trivy Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/reports:/reports \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            -o /reports/trivy-report.txt \
            $IMAGE_NAME:$IMAGE_TAG

      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/


# ---------------- DOCKER PUSH ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Docker Login
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Push Image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest


# ---------------- REPORT ----------------
  report:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Generate Report
        run: |
          mkdir -p reports

          echo "Pipeline: $GITHUB_RUN_ID" > reports/github-report.txt
          echo "Repo: $GITHUB_REPOSITORY" >> reports/github-report.txt
          echo "Image: $IMAGE_NAME:$IMAGE_TAG" >> reports/github-report.txt
          echo "Date: $(date)" >> reports/github-report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/