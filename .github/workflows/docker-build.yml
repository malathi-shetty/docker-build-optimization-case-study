name: Docker Build Optimization CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: docker-build-github
  IMAGE_TAG: ${{ github.run_number }}

jobs:

  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and Verify
        run: |
          cd app/build-optimization-demo
          mvn clean verify

      - name: Set Image Tag
        id: set_tag
        run: echo "tag=${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT


  sonar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd app/build-optimization-demo
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  docker_build:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            -f Dockerfile.multistage \
            -t $IMAGE_NAME:$IMAGE_TAG .


  security_scan:
    runs-on: ubuntu-latest
    needs: docker_build

    steps:
      - name: Trivy Scan
        run: |
          mkdir -p reports

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/reports:/reports \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            -o /reports/trivy-report.txt \
            $IMAGE_NAME:$IMAGE_TAG


  docker_push:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Docker Login
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login \
            -u "$DOCKERHUB_USERNAME" \
            --password-stdin

      - name: Push Image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG \
            $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG

          docker tag $IMAGE_NAME:$IMAGE_TAG \
            $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest


  report:
    runs-on: ubuntu-latest
    needs: docker_push

    steps:
      - name: Generate Report
        run: |
          mkdir -p reports
          echo "Repository: $GITHUB_REPOSITORY" > reports/github-report.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> reports/github-report.txt
          echo "Run Number: $GITHUB_RUN_NUMBER" >> reports/github-report.txt
          echo "Commit SHA: $GITHUB_SHA" >> reports/github-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> reports/github-report.txt
          echo "Date: $(date)" >> reports/github-report.txt

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
          retention-days: 30