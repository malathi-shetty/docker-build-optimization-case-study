name: Docker Build Optimization

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: docker-build-optimization
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Jar
        run: |
          cd app/build-optimization-demo
          mvn clean package

      - name: Build Docker Image
        run: |
          docker build \
          -f Dockerfile.multistage \
          -t $IMAGE_NAME:$IMAGE_TAG .


      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.52.2/trivy_0.52.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.52.2_Linux-64bit.deb


      - name: Trivy Scan
        run: |
          mkdir -p reports

          trivy image \
          --format table \
          -o reports/trivy-report.txt \
          $IMAGE_NAME:$IMAGE_TAG

          cat reports/trivy-report.txt

      - name: Generate Report
        run: |
          mkdir -p reports

          echo "Repository: $GITHUB_REPOSITORY" > reports/github-report.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> reports/github-report.txt
          echo "Run Number: $GITHUB_RUN_NUMBER" >> reports/github-report.txt

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/