name: Full DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  IMAGE_NAME: docker-build-github
  IMAGE_TAG: ${{ github.run_number }}

jobs:

# ---------------- BUILD + SONAR ----------------
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + Test + Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd app/build-optimization-demo
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      - uses: actions/upload-artifact@v4
        with:
          name: target
          path: app/build-optimization-demo/target


# ---------------- DOCKER BUILD ----------------
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.multistage \
            -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Save Docker Image
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar


# ---------------- SECURITY ----------------
  security:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Trivy Scan
        run: |
          mkdir -p reports

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/reports:/reports \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --format table \
            -o /reports/trivy-report.txt \
            $IMAGE_NAME:$IMAGE_TAG

      - uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load Image
        run: docker load -i image.tar

      - name: Docker Login
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin


      - name: Debug Docker Variables
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME"
          echo "IMAGE_TAG=$IMAGE_TAG"

          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME is EMPTY"
            exit 1
          else
            echo "DOCKERHUB_USERNAME is set"
          fi

      - name: Push Image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:latest

          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:latest


# ---------------- REPORT ----------------
  report:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Generate Report
        run: |
          mkdir -p reports

          echo "Pipeline: $GITHUB_RUN_ID" > reports/github-report.txt
          echo "Repo: $GITHUB_REPOSITORY" >> reports/github-report.txt
          echo "Image: $IMAGE_NAME:$IMAGE_TAG" >> reports/github-report.txt
          echo "Date: $(date)" >> reports/github-report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/