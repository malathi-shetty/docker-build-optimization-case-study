apiVersion: apps/v1
kind: Deployment

metadata:
  name: docker-build-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: docker-build-demo

  template:
    metadata:
      labels:
        app: docker-build-demo

    spec:
      containers:
      - name: app
        image: yourdockerhub/docker-build-optimization:latest

        ports:
        - containerPort: 8080